<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="left">Khanban</div>
            <div id="add-new-task" class="right"><button>Add New Task</button></div>
        </nav>
        <section class="board">
            
        <div id="todo" class="task-column">
             <div class="heading">
                <div class="left">To Do</div>
                <div class="right">Count</div>
            </div>
        </div>

             <div id="in-progress" class="task-column">
             <div class="heading">
                <div class="left">In Progress</div>
                <div class="right">Count</div>
            </div>
        </div>

            <div id="done" class="task-column">
             <div class="heading">
                <div class="left">Done</div>
                <div class="right">Count</div>
            </div>
        </div>
        </section>
    </main>

    <div class=" modal add-new-task-modal">
        <div id="modalBg" class="bg"></div>
        <div class="center">
            <input id="task-title-input" type="text" placeholder="Task Title">
            <textarea  id="task-description-input" placeholder="Task Description"></textarea>
            <button id="add-new-task-to-column">Add Task</button>
        </div>
    </div>

    <div class="edit-modal">
        <div class="bg"></div>
        <div class="center">
            <input id="edit-input-title" type="text" placeholder="Edit the title">
        <textarea  id="edit-input-desc" placeholder="Edit the Description"></textarea>
        <button id="save-btn">Save</button>
        </div>
    </div>

</body>
<script src="script.js"></script>
</html>
